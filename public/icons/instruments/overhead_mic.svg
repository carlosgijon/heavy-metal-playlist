<svg width="100" height="160" viewBox="0 0 100 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Tripod legs -->
  <line x1="50" y1="145" x2="20" y2="155" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="145" x2="80" y2="155" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="145" x2="50" y2="158" stroke="#222" stroke-width="4" stroke-linecap="round"/>

  <!-- Main vertical stand -->
  <line x1="50" y1="40" x2="50" y2="145" stroke="#777" stroke-width="6" stroke-linecap="square"/>
  <line x1="51" y1="40" x2="51" y2="145" stroke="#999" stroke-width="2" stroke-linecap="square"/> <!-- highlight -->
  
  <!-- Boom joint -->
  <circle cx="50" cy="40" r="7" fill="#222" stroke="#111" stroke-width="2"/>
  <circle cx="50" cy="40" r="3" fill="#555"/>
  
  <!-- Boom arm and counterweight -->
  <line x1="75" y1="50" x2="20" y2="28" stroke="#777" stroke-width="5" stroke-linecap="round"/>
  <line x1="76" y1="49" x2="21" y2="27" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/> <!-- highlight -->
  
  <!-- Counterweight -->
  <g transform="translate(70, 48) rotate(-21.8)">
    <rect x="-5" y="-5" width="10" height="10" rx="2" fill="#111"/>
  </g>

  <!-- Mic clip -->
  <path d="M 20 28 L 15 35 L 25 35 Z" fill="#111"/>
  
  <!-- Pencil Condenser Microphone (hanging down) -->
  <line x1="16" y1="20" x2="26" y2="48" stroke="#111" stroke-width="8" stroke-linecap="round"/>
  <!-- Silver tip of mic -->
  <line x1="24" y1="43" x2="27" y2="50" stroke="#ccc" stroke-width="8" stroke-linecap="round"/>
</svg>
