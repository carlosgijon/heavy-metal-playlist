<svg width="260" height="80" viewBox="0 0 260 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Left Stand Base -->
  <path d="M 40 75 L 20 80 L 60 80 Z" fill="#444" stroke="#111" stroke-width="1"/>
  <!-- Left Stand -->
  <line x1="40" y1="20" x2="40" y2="75" stroke="#777" stroke-width="4"/>
  <line x1="41" y1="20" x2="41" y2="75" stroke="#999" stroke-width="1.5"/>
  <circle cx="40" cy="20" r="5" fill="#222" stroke="#111" stroke-width="1"/>
  <line x1="25" y1="25" x2="70" y2="10" stroke="#777" stroke-width="3" stroke-linecap="round"/>
  <!-- Left Mic (pointing down-right) -->
  <line x1="70" y1="10" x2="90" y2="35" stroke="#111" stroke-width="6" stroke-linecap="round"/>
  <line x1="86" y1="30" x2="91" y2="36" stroke="#ccc" stroke-width="6" stroke-linecap="round"/>

  <!-- Right Stand Base -->
  <path d="M 220 75 L 200 80 L 240 80 Z" fill="#444" stroke="#111" stroke-width="1"/>
  <!-- Right Stand -->
  <line x1="220" y1="20" x2="220" y2="75" stroke="#777" stroke-width="4"/>
  <line x1="221" y1="20" x2="221" y2="75" stroke="#999" stroke-width="1.5"/>
  <circle cx="220" cy="20" r="5" fill="#222" stroke="#111" stroke-width="1"/>
  <line x1="235" y1="25" x2="190" y2="10" stroke="#777" stroke-width="3" stroke-linecap="round"/>
  <!-- Right Mic (pointing down-left) -->
  <line x1="190" y1="10" x2="170" y2="35" stroke="#111" stroke-width="6" stroke-linecap="round"/>
  <line x1="174" y1="30" x2="169" y2="36" stroke="#ccc" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Dashed line connecting them to show it's a stereo pair -->
  <line x1="90" y1="35" x2="170" y2="35" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="130" y="30" fill="#888" font-size="10" font-weight="bold" font-family="sans-serif" text-anchor="middle">L/R PAIR</text>
</svg>
