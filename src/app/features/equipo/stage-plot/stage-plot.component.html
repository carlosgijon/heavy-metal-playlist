<div class="p-4 h-full flex flex-col md:flex-row gap-4 printable-area">
  
  <!-- Sidebar Izquierdo: Inventario y Propiedades -->
  <div class="w-full md:w-80 bg-base-200 rounded-xl flex flex-col hide-on-print h-[400px] md:h-auto overflow-hidden shadow-lg border border-base-300">
    
    <!-- Pestañas simuladas (Podemos simplemente apilar) -->
    <div class="p-4 bg-base-300 font-bold border-b border-base-400 shadow-sm z-10 flex justify-between items-center">
      <span>Constructor Escenario</span>
      <span class="text-xs font-normal">
        <span *ngIf="saving">⏳</span>
        <span *ngIf="!saving" class="text-success">✔</span>
      </span>
    </div>

    <!-- Panel de Selección (Muestra controles si hay algo seleccionado) -->
    <div *ngIf="selectedItem" class="bg-primary/10 border-b border-primary p-4 animate-fade-in shrink-0">
      <div class="flex justify-between items-center mb-2">
        <h4 class="font-bold text-sm text-primary">Elemento Seleccionado</h4>
        <button class="btn btn-xs btn-ghost text-error" (click)="removeFromStage(selectedItem)">Quitar</button>
      </div>
      <p class="text-xs mb-3 truncate">{{selectedItem.label}}</p>
      
      <div class="form-control">
        <label class="label p-0 pb-1">
          <span class="label-text text-xs">Rotación ({{selectedItem.rotation}}º)</span>
        </label>
        <input type="range" min="0" max="360" [(ngModel)]="selectedItem.rotation" (change)="onRotationChange()" class="range range-xs range-primary" />
      </div>
    </div>

    <!-- Lista de Inventario -->
    <div class="flex-1 overflow-y-auto p-2 space-y-2">
      <div *ngFor="let cat of categories" class="collapse collapse-arrow bg-base-100 border border-base-300">
        <input type="checkbox" [checked]="cat.open" (change)="toggleCategory(cat)" /> 
        <div class="collapse-title font-medium text-sm py-3 min-h-0">
          {{cat.title}} <span class="opacity-50 text-xs ml-1">({{cat.items.length}})</span>
        </div>
        <div class="collapse-content p-2 pt-0 space-y-1">
          <div *ngFor="let eq of cat.items" class="bg-base-200 p-2 rounded flex justify-between items-center text-xs border border-transparent hover:border-primary/30 transition-colors">
            <span class="truncate pr-2 flex-1" [title]="eq.label">{{eq.label}}</span>
            <button class="btn btn-xs btn-outline btn-primary shrink-0" (click)="addToStage(eq)">Añadir</button>
          </div>
          <div *ngIf="cat.items.length === 0" class="text-xs opacity-50 p-2 text-center">
            No hay elementos
          </div>
        </div>
      </div>
    </div>

    <div class="p-4 bg-base-300 border-t border-base-400 shrink-0">
      <button class="btn btn-sm btn-block btn-secondary" (click)="printStagePlot()">Imprimir PDF</button>
    </div>
  </div>

  <!-- Escenario Principal -->
  <!-- Al hacer click fuera de los elementos, deseleccionamos -->
  <div class="flex-1 bg-neutral rounded-xl relative overflow-hidden shadow-inner min-h-[500px] border-2 border-neutral-focus" (click)="deselectAll()">
    
    <!-- Grid pattern (cuadrícula) -->
    <div class="absolute inset-0 stage-grid pointer-events-none opacity-20"></div>

    <!-- Decoración Escenario -->
    <div class="absolute inset-x-0 bottom-0 h-16 bg-gradient-to-t from-base-300 to-transparent pointer-events-none flex items-end justify-center pb-2 z-0">
      <span class="text-3xl font-bold opacity-20 text-base-content tracking-widest">PÚBLICO</span>
    </div>
    <div class="absolute inset-x-0 top-0 h-8 flex items-center justify-center pointer-events-none z-0">
      <span class="text-xs font-bold opacity-30 text-white">FONDO DEL ESCENARIO</span>
    </div>

    <!-- Contenedor Drag & Drop -->
    <div class="absolute inset-4 z-10" id="stage-boundary">
      
      <!-- Wrapper cdkDrag: controla SOLO la traslación (x, y) -->
      <div *ngFor="let item of items" 
           cdkDrag 
           cdkDragBoundary="#stage-boundary"
           [cdkDragFreeDragPosition]="{x: item.x, y: item.y}"
           (cdkDragEnded)="onDragEnded($event, item)"
           (click)="selectItem(item); $event.stopPropagation()"
           class="absolute cursor-move group"
           [style.width.px]="item.width"
           [style.height.px]="item.height"
           [style.zIndex]="selectedItem?.id === item.id ? 100 : 10">
        
        <!-- Elemento interno: controla ROTACIÓN y TAMAÑO REAL -->
        <!-- La rotación se aplica centrada -->
        <div class="w-full h-full relative" [style.transform]="'rotate(' + item.rotation + 'deg)'">
          
          <div class="w-full h-full rounded bg-base-100/90 shadow-md border flex items-center justify-center text-primary overflow-hidden transition-colors"
               [ngClass]="selectedItem?.id === item.id ? 'border-primary ring-2 ring-primary ring-opacity-50' : 'border-base-content/20'">
            <img *ngIf="item.iconType === 'svg'" [src]="item.iconValue" class="w-full h-full object-contain p-1" [alt]="item.label">
            <span *ngIf="item.iconType === 'text'" class="font-bold text-lg uppercase" [style.fontSize]="(item.width * 0.4) + 'px'">{{item.iconValue}}</span>
          </div>

        </div>

        <!-- Etiqueta externa (No rota con el elemento, siempre se lee bien) -->
        <div class="absolute top-full left-1/2 -translate-x-1/2 mt-1 bg-neutral-focus/80 text-white text-[9px] px-1.5 py-0.5 rounded shadow text-center truncate whitespace-nowrap z-50 opacity-0 group-hover:opacity-100 transition-opacity"
             [ngClass]="{'opacity-100': selectedItem?.id === item.id}"
             style="max-width: 120px;">
          {{item.label}}
        </div>

      </div>

    </div>

  </div>
</div>
